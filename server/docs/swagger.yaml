openapi: "3.0.3"
info:
  title: server API
  version: "1.0.0"
  description: API documentation for server
servers:
  - url: http://localhost:8080/api/v1
    description: Local development
paths:
  /health:
    get:
      summary: Health check
      tags:
        - Health
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  app:
                    type: string
                    example: server
                  env:
                    type: string
                    example: development
